<section id="packages-section" class="py-24 bg-white px-[8%]">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h2 class="font-header text-4xl lg:text-5xl text-[#1a4d41] uppercase">Featured Tour Packages</h2>
            <p class="text-gray-500 mt-2">All-inclusive deals: Accommodation, Transfers, and Tours.</p>
        </div>
        <button class="hidden md:block text-[#1a4d41] font-bold border-2 border-[#1a4d41] px-6 py-2 rounded-full hover:bg-[#1a4d41] hover:text-white transition">View All Deals</button>
    </div>

    <div id="packages-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
        <!-- Packages will be loaded dynamically -->
        <div class="col-span-full text-center py-8">
            <p class="text-gray-500">Loading packages...</p>
        </div>
    </div>
</section>

<!-- Activities Modal -->
<div id="activities-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeActivitiesModal()"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
        <div class="bg-[#1a4d41] px-6 py-4 flex items-center justify-between">
            <h3 id="activities-modal-title" class="text-xl font-bold text-white"></h3>
            <button onclick="closeActivitiesModal()" class="text-white/80 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div id="activities-modal-content" class="p-6">
            <div id="activities-modal-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            
            <!-- Book Full Package Button -->
            <div class="mt-6 pt-6 border-t border-gray-200">
                <button onclick="bookFullPackage()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-xl hover:bg-orange-600 transition text-lg">
                    📦 Book Full Package
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Store current package data for booking
let currentPackageData = {
    city: '',
    title: '',
    price: 0,
    img: ''
};

// Open activities modal for a city
window.openActivitiesModal = function(cityName, packageTitle, price, image) {
    const modal = document.getElementById('activities-modal');
    const title = document.getElementById('activities-modal-title');
    const grid = document.getElementById('activities-modal-grid');
    
    if (!modal || !title || !grid) return;
    
    // Store package data for booking
    currentPackageData = {
        city: cityName,
        title: packageTitle,
        price: price,
        img: image
    };
    
    title.textContent = cityName + ' Activities';
    
    // Check if cityData exists
    if (typeof cityData === 'undefined') {
        console.warn('cityData not loaded');
        grid.innerHTML = '<p class="text-center text-gray-500 py-8">Loading activities...</p>';
    } else {
        const activities = cityData[cityName];
        if (!activities || activities.length === 0) {
            grid.innerHTML = '<p class="text-center text-gray-500 py-8">No activities available for ' + cityName + '</p>';
        } else {
            // Clear existing content and build safely using DOM to prevent XSS
            grid.innerHTML = '';
            
            activities.forEach(act => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'bg-gray-50 p-4 rounded-xl hover:shadow-md transition';
                
                const innerDiv = document.createElement('div');
                innerDiv.className = 'flex items-center gap-3 mb-3';
                
                const img = document.createElement('img');
                img.src = act.img || 'Picture/Cebu Ocean Park.webp';
                img.onerror = function() { this.onerror=null; this.src = 'Picture/Cebu Ocean Park.webp'; };
                img.className = 'w-16 h-12 rounded-lg object-cover';
                
                const infoDiv = document.createElement('div');
                
                const h4 = document.createElement('h4');
                h4.className = 'font-bold text-[#1a4d41] text-sm';
                h4.textContent = act.title || '';  // textContent prevents XSS
                
                const ratingP = document.createElement('p');
                ratingP.className = 'text-xs text-orange-500 font-bold';
                ratingP.textContent = '★ ' + (act.rating || '');
                
                infoDiv.appendChild(h4);
                infoDiv.appendChild(ratingP);
                innerDiv.appendChild(img);
                innerDiv.appendChild(infoDiv);
                
                const descP = document.createElement('p');
                descP.className = 'text-xs text-gray-600 mb-3 line-clamp-2';
                descP.textContent = act.rating ? '★ ' + act.rating + ' rating' : '';  // textContent prevents XSS
                
                const priceDiv = document.createElement('div');
                priceDiv.className = 'flex justify-between items-center';
                
                const priceSpan = document.createElement('span');
                priceSpan.className = 'font-bold text-[#1a4d41]';
                priceSpan.textContent = formatPrice(act.price);
                
                priceDiv.appendChild(priceSpan);
                
                itemDiv.appendChild(innerDiv);
                itemDiv.appendChild(descP);
                itemDiv.appendChild(priceDiv);
                
                grid.appendChild(itemDiv);
            });
        }
    }
    
    modal.classList.remove('hidden');
}

// Close activities modal
window.closeActivitiesModal = function() {
    const modal = document.getElementById('activities-modal');
    if (modal) {
        modal.classList.add('hidden');
        currentPackageData = { city: '', title: '', price: 0, img: '' };
    }
}

// Book full package - show modal with date and pax selection
window.bookFullPackage = async function() {
    if (!currentPackageData.title) {
        showNotification('Please select a package first', 'error');
        return;
    }
    
    console.log('bookFullPackage called, currentPackageData:', currentPackageData);
    
    // Wait for modals to be loaded (handle async loading)
    let attempts = 0;
    let modal = document.getElementById('booking-modal');
    
    console.log('Initial modal check:', modal);
    
    // Wait up to 2 seconds for modal to become available
    while (!modal && attempts < 20) {
        await new Promise(resolve => setTimeout(resolve, 100));
        modal = document.getElementById('booking-modal');
        console.log('Modal check attempt', attempts, ':', modal);
        attempts++;
    }
    
    if (modal) {
        console.log('Modal found, populating...');
        // Use the existing booking modal from cityDestination page
        // Populate it with package data
        const cityNameEl = document.getElementById('booking-city-name');
        const pkgNameEl = document.getElementById('booking-package-name');
        const pkgPriceEl = document.getElementById('booking-package-price');
        
        if (cityNameEl) cityNameEl.textContent = currentPackageData.city || 'Tour Package';
        if (pkgNameEl) pkgNameEl.textContent = currentPackageData.title;
        if (pkgPriceEl) pkgPriceEl.textContent = formatPrice(currentPackageData.price);
        
        // Set default date
        const dateInput = document.getElementById('booking-date');
        if (dateInput) {
            const travelDate = new Date();
            travelDate.setDate(travelDate.getDate() + 7);
            dateInput.value = travelDate.toISOString().split('T')[0];
        }
        
        // Set default pax
        const paxInput = document.getElementById('booking-pax');
        if (paxInput) {
            paxInput.value = 1;
            const paxDisplay = document.getElementById('pax-display');
            if (paxDisplay) paxDisplay.textContent = '1 Person';
        }
        
        // Update total
        const priceDisplay = document.getElementById('booking-price-display');
        if (priceDisplay) {
            priceDisplay.textContent = formatPrice(currentPackageData.price);
        }
        
        // Show modal
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        
        // Add form submit handler using onsubmit (like activity modal)
        const bookingForm = document.getElementById('booking-form');
        if (bookingForm) {
            console.log('Setting up form handler for package booking');
            bookingForm.onsubmit = function(e) {
                e.preventDefault();
                e.stopPropagation(); // Stop document listener from also firing
                
                const pax = parseInt(document.getElementById('booking-pax').value) || 1;
                const date = document.getElementById('booking-date').value;
                
                if (!date) {
                    showNotification('Please select a travel date', 'error');
                    return;
                }
                
                // Create package data object for cart
                const packageData = {
                    id: 'pkg_' + currentPackageData.city.toLowerCase().replace(/\s+/g, '_'),
                    title: currentPackageData.title,
                    city: currentPackageData.city,
                    img: currentPackageData.img,
                    price: currentPackageData.price,
                    originalCurrency: 'PHP'
                };
                
                // Add to cart
                if (typeof window.addToCart === 'function') {
                    window.addToCart(packageData, pax, date, []);
                    showNotification('Package "' + currentPackageData.title + '" added to cart for ' + pax + ' person(s)!', 'success');
                } else if (typeof addToCart === 'function') {
                    addToCart(packageData, pax, date, []);
                    showNotification('Package "' + currentPackageData.title + '" added to cart for ' + pax + ' person(s)!', 'success');
                } else {
                    showNotification('Cart functionality not available', 'error');
                    return;
                }
                
                // Close modal
                const modal = document.getElementById('booking-modal');
                if (modal) {
                    modal.classList.add('hidden');
                    document.body.style.overflow = 'auto';
                }
                
                // Show floating cart
                const floatingCart = document.getElementById('floating-cart');
                if (floatingCart) {
                    floatingCart.classList.remove('hidden');
                }
                
                if (typeof window.updateFloatingCart === 'function') {
                    window.updateFloatingCart();
                }
            };
        } else {
            console.error('booking-form not found');
        }
    } else {
        // Show error instead of silently adding to cart
        console.error('Booking modal not found in DOM');
        showNotification('Unable to open booking modal. Please refresh the page and try again.', 'error');
    }
}

// Helper function to add package to cart (fallback)
function addPackageToCart() {
    if (!currentPackageData.title) return;
    
    // Get today's date + 7 days as default travel date
    const travelDate = new Date();
    travelDate.setDate(travelDate.getDate() + 7);
    const dateStr = travelDate.toISOString().split('T')[0];
    
    // Create package data object for cart
    const packageData = {
        id: 'pkg_' + currentPackageData.city.toLowerCase().replace(/\s+/g, '_'),
        title: currentPackageData.title,
        city: currentPackageData.city,
        img: currentPackageData.img,
        price: currentPackageData.price,
        originalCurrency: 'PHP'
    };
    
    // Add to cart with default pax = 1, travel date, no personalization
    if (typeof window.addToCart === 'function') {
        window.addToCart(packageData, 1, dateStr, []);
        showNotification('Package added to cart!', 'success');
    } else if (typeof addToCart === 'function') {
        addToCart(packageData, 1, dateStr, []);
        showNotification('Package added to cart!', 'success');
    } else {
        // Fallback: add directly to localStorage
        const cartItem = {
            id: 'item_' + Date.now() + Math.random().toString(36).substr(2, 9),
            packageId: packageData.id,
            packageTitle: packageData.title,
            city: packageData.city,
            img: packageData.img,
            basePrice: packageData.price,
            paxSize: 1,
            travelDate: dateStr,
            personalization: [],
            totalPrice: packageData.price,
            originalCurrency: 'PHP',
            addedAt: new Date().toISOString()
        };
        
        const cartStr = localStorage.getItem('avalmeos_cart');
        const cart = cartStr ? JSON.parse(cartStr) : { items: [], total: 0 };
        cart.items.push(cartItem);
        
        // Calculate total
        cart.total = cart.items.reduce((sum, item) => sum + item.totalPrice, 0);
        
        localStorage.setItem('avalmeos_cart', JSON.stringify(cart));
        
        // Update UI
        updateCartCount();
        updateFloatingCart();
        
        showNotification('Package added to cart!', 'success');
    }
    
    closeActivitiesModal();
}

// Show notification
function showNotification(message, type) {
    const container = document.getElementById('notification-container');
    if (!container) {
        alert(message);
        return;
    }
    
    const notification = document.createElement('div');
    notification.className = `p-4 rounded-lg shadow-lg ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
    notification.textContent = message;
    container.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

// Update cart count
function updateCartCount() {
    const countEl = document.getElementById('cart-count');
    const countElFloating = document.getElementById('cart-count-floating');
    const cartStr = localStorage.getItem('avalmeos_cart');
    
    if (cartStr) {
        const cart = JSON.parse(cartStr);
        const count = cart.items.length;
        
        if (countEl) {
            countEl.textContent = count;
            countEl.classList.toggle('hidden', count === 0);
        }
        if (countElFloating) {
            countElFloating.textContent = count;
            countElFloating.classList.toggle('hidden', count === 0);
        }
    } else {
        if (countEl) countEl.classList.add('hidden');
        if (countElFloating) countElFloating.classList.add('hidden');
    }
}

// Update floating cart
function updateFloatingCart() {
    const container = document.getElementById('cart-items-container');
    const totalEl = document.getElementById('cart-total');
    const cartStr = localStorage.getItem('avalmeos_cart');
    
    if (!container) return;
    
    if (cartStr) {
        const cart = JSON.parse(cartStr);
        
        if (cart.items.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-500 py-8">Your cart is empty</p>';
            if (totalEl) totalEl.innerHTML = '';
            return;
        }
        
        container.innerHTML = cart.items.map(item => `
            <div class="flex items-center gap-3 py-3 border-b">
                <img src="${item.img || 'Picture/Cebu Ocean Park.webp'}" class="w-12 h-12 rounded-lg object-cover">
                <div class="flex-1">
                    <h4 class="font-bold text-sm">${item.packageTitle}</h4>
                    <p class="text-xs text-gray-500">${item.city} | ${item.paxSize} pax</p>
                    <p class="text-xs text-orange-500 font-bold">${formatPrice(item.totalPrice)}</p>
                </div>
                <button onclick="removeFromCart('${item.id}')" class="text-red-500 text-xs">✕</button>
            </div>
        `).join('');
        
        if (totalEl) {
            totalEl.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold">Total</span>
                    <span class="text-xl font-bold text-orange-500">${formatPrice(cart.total)}</span>
                </div>
            `;
        }
    } else {
        container.innerHTML = '<p class="text-center text-gray-500 py-8">Your cart is empty</p>';
        if (totalEl) totalEl.innerHTML = '';
    }
}

// Remove from cart
function removeFromCart(itemId) {
    const cartStr = localStorage.getItem('avalmeos_cart');
    if (cartStr) {
        const cart = JSON.parse(cartStr);
        cart.items = cart.items.filter(item => item.id !== itemId);
        cart.total = cart.items.reduce((sum, item) => sum + item.totalPrice, 0);
        localStorage.setItem('avalmeos_cart', JSON.stringify(cart));
        updateCartCount();
        updateFloatingCart();
    }
}

// Initialize component load state
if (typeof window.componentLoadState !== 'undefined') {
    window.componentLoadState.packages = true;
}

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeActivitiesModal();
    }
});
</script>
