<!-- User Edit Modal -->
<div id="user-edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-hidden">
        <!-- Header -->
        <div class="p-6 border-b flex justify-between items-center bg-[#1a4d41] text-white">
            <div>
                <h3 class="text-xl font-bold">Edit User</h3>
                <p class="text-sm opacity-80 mt-1" id="user-edit-name"></p>
            </div>
            <button onclick="closeUserEditModal()" class="text-white/80 hover:text-white transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        
        <!-- Edit Form -->
        <form id="user-edit-form" onsubmit="submitUserEdit(event)">
            <div class="p-6 space-y-4">
                <!-- User Info Display -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-500">Email</p>
                    <p id="user-edit-email" class="font-medium text-gray-900"></p>
                </div>
                
                <!-- Role -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                    <select id="user-edit-role" name="role" class="w-full p-3 border rounded-xl" required>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <!-- Status -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select id="user-edit-status" name="status" class="w-full p-3 border rounded-xl" required>
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
                
                <!-- Error/Success Message -->
                <div id="user-edit-status-message" class="hidden p-3 rounded-lg text-sm"></div>
            </div>
            
            <!-- Footer -->
            <div class="p-6 border-t flex justify-end gap-3">
                <button 
                    type="button" 
                    onclick="closeUserEditModal()"
                    class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition"
                >
                    Cancel
                </button>
                <button 
                    type="submit" 
                    id="user-edit-submit"
                    class="px-6 py-2 bg-[#1a4d41] text-white rounded-lg hover:bg-[#153d32] transition flex items-center gap-2"
                >
                    <span>Save Changes</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Escape key handler -->
<script>
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeUserEditModal();
    }
});

// Backdrop click handler
document.addEventListener('click', (e) => {
    const modal = document.getElementById('user-edit-modal');
    if (modal && e.target === modal) {
        closeUserEditModal();
    }
});
</script>
